<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceylon RS v1.6</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050810;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#101623;
position:sticky;
top:0;
}

/* WALLET CARD */
.wallet{
margin:15px;
padding:20px;
border-radius:18px;
background:linear-gradient(135deg,#0d1422,#101623);
box-shadow:0 0 20px rgba(0,255,255,0.08);
}

.balance{
font-size:26px;
font-weight:bold;
color:#00f2ff;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00f2ff,#7000ff);
color:black;
font-weight:bold;
cursor:pointer;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin:15px;
}

.box{
background:#0d1422;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

/* HISTORY */
.history{
margin:15px;
padding:15px;
background:#101623;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
font-size:13px;
}

.green{color:#00ff88;}
.red{color:#ff4d4d;}
.blue{color:#00c2ff;}
.gold{color:#ffcc00;}

/* SOCIAL BAR */
.social-bar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111827;
padding:10px;
text-align:center;
font-size:12px;
}

.center{text-align:center;}
</style>
</head>

<body>

<header>
<h3>CEYLON RS</h3>
<div>💰 <span id="bal">10</span></div>
</header>

<!-- WALLET -->
<div class="wallet">
<div>Available Balance</div>
<div class="balance" id="balance">10.00 CRS</div>
</div>

<!-- ACTIONS -->
<div class="grid">
<div class="box" onclick="spin()">🎡 Spin</div>
<div class="box" onclick="bonus()">🎁 Bonus</div>
<div class="box">🎯 Mines</div>
<div class="box">🎟 Scratch</div>
</div>

<!-- HISTORY -->
<div class="history">
<h4>Transaction History</h4>
<div id="history"></div>
</div>

<!-- AD SPACE -->
<div class="wallet center">
<p>Ad Banner (300x250)</p>
</div>

<!-- SOCIAL BAR -->
<div class="social-bar">
⚡ Ad Zone | Ceylon RS v1.6
</div>

<script>

let bal = 10;
let history = [];

/* INIT */
window.onload = () => {
render();
}

/* ADD TRANSACTION */
function addHistory(type, amount){

let color = "green";
if(type === "Bonus") color = "blue";
if(type === "Referral") color = "gold";

let time = new Date().toLocaleTimeString();

history.unshift({
type, amount, color, time
});

render();
}

/* RENDER UI */
function render(){

document.getElementById("bal").innerText = bal.toFixed(2) + " CRS";

let html = "";
history.forEach(h=>{
html += `
<div class="item">
<span class="${h.color}">
${h.type} +${h.amount}
</span>
<span>${h.time}</span>
</div>`;
});

document.getElementById("history").innerHTML = html;
}

/* BONUS (SMARTLINK READY ZONE) */
function bonus(){

window.open("https://www.profitableratecpm.com/29723325","_blank");

bal += 10;
addHistory("Bonus",10);

render();
}

/* SPIN */
function spin(){

let win = Math.floor(Math.random()*30);
bal += win;

addHistory("Spin", win);

render();
}

</script>

</body>
</html>
