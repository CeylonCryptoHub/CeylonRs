<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background: #050810; color: #fff; font-family: sans-serif; text-align: center; }
.box { padding: 20px; }
button { padding: 15px 30px; background: #00f2ff; border: none; border-radius: 50px; cursor: pointer; }
</style>
</head>
<body>
<div id="login" class="box">
    <h1>TAPRO CRS</h1>
    <button onclick="enter()">ENTER DASHBOARD</button>
</div>
<div id="dash" class="box" style="display:none;">
    <h1>Balance: <span id="bal">103.00</span> CRS</h1>
    <h2 id="price">Price: Loading...</h2>
</div>
<script>
let balance = 103.00;
function enter() {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    getPrice();
}
async function getPrice() {
    try {
        let res = await fetch("https://api.dexscreener.com/latest/dex/tokens/HQPMEbkZmwxCscm6wQmDXc5Ywyft7aRsbKdooh6Ldr8a");
        let data = await res.json();
        let p = data.pairs[0].priceUsd;
        document.getElementById('price').innerText = "Price: $" + p;
    } catch(e) { document.getElementById('price').innerText = "Price: $0.00084"; }
}
</script>
</body>
</html>
